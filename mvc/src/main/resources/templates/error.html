<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>오류 발생</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .status {
            font-size: 72px;
            font-weight: 700;
            color: #ff5e57;
            margin-bottom: 10px;
        }

        .error {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .message {
            font-size: 15px;
            color: #666;
            margin-bottom: 20px;
        }

        .info {
            background: #f7f7f7;
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .info div {
            margin-bottom: 6px;
        }

        .label {
            font-weight: 600;
            color: #333;
        }

        .value {
            color: #555;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 25px;
            background: #333;
            color: #fff;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn:hover {
            background: #000;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="status" th:text="${status}">500</div>

    <div class="error" th:text="${error}">Internal Server Error</div>

    <div class="info">
        <div>
            <span class="label">시간:</span>
            <span class="value" th:text="${#temporals.format(now,'yyyy년 MM월 dd일 HH시 mm분 ss초')}">/example</span>
        </div>
    </div>

    <a href="/member/list" class="btn">홈으로 이동</a>

    <div class="footer">
        © Your Service Wow !
    </div>
</div>

</body>
</html>
